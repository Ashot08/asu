  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }

    .note { position: absolute; font-size: 16px; background: #fff; padding: 2px 6px; }
    .arrow { position: absolute; background: #333; }
    .h { height: 3px; }
    .v { width: 3px; }
    .small { font-size: 14px; color: #333; }
  </style>
</head>
<body>

    <div class="note small" style="left: 20px; top: 230px;">Предзаказы на мероприятия</div>

    <div class="note" style="left: 565px; top: 470px;">M: Персонал, печи, сырье, транспорт</div>

    <div class="note small" style="left: 28px; top: 485px;">Контекстная диаграмма верхнего уровня</div>
  </div>
</body>
